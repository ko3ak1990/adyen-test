name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  # ── Step 1: always run; decides what changed ────────────────────────────────
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      path_filter: ${{ steps.filter.outputs.path_filter }}
      jrich_plugin: ${{ steps.filter.outputs.jrich_plugin }}
      android:      ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for git diff

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compute changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            # First push to this branch — diff against empty tree
            BASE="$(git hash-object -t tree /dev/null)"
          else
            BASE="${{ github.event.before }}"
          fi
          git diff --name-only "$BASE" HEAD > /tmp/changed-files.txt
          echo "=== Changed files ==="
          cat /tmp/changed-files.txt

      - name: Run path filter
        run: |
          CHANGED=$(tr '\n' ' ' < /tmp/changed-files.txt)
          ./gradlew :path-filter:run \
            --args="--config filters.yaml --output /tmp/filter-result.env $CHANGED"
          echo "=== Filter results ==="
          cat /tmp/filter-result.env

      - name: Export filter results
        id: filter
        run: cat /tmp/filter-result.env >> "$GITHUB_OUTPUT"

  # ── Step 2: test path-filter CLI ────────────────────────────────────────────
  test-path-filter:
    name: Test path-filter CLI
    needs: detect-changes
    if: needs.detect-changes.outputs.path_filter == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew :path-filter:test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: path-filter-test-report
          path: path-filter/build/reports/tests/test/

  # ── Step 3: test jRich plugin ────────────────────────────────────────────────
  test-jrich-plugin:
    name: Test jRich plugin
    needs: detect-changes
    if: needs.detect-changes.outputs.jrich_plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew -p jrich-plugin test

      # The enriched XML produced by the plugin itself is the artifact that
      # demonstrates filename + line enrichment in CI reporting tools.
      - name: Upload enriched JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jrich-plugin-enriched-xml
          path: jrich-plugin/build/reports/junit-enriched/**

  # ── Step 4: test Android app ─────────────────────────────────────────────────
  test-android:
    name: Test Android app
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v3

      - name: Run Android unit tests
        run: ./gradlew :android-app:testDebugUnitTest

      - name: Upload enriched JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-enriched-xml
          path: android-app/build/reports/junit-enriched-demo/**
